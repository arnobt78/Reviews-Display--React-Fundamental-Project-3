<!DOCTYPE html>
<!-- Single-page app shell: root div for React, meta for SEO and viewport. Script loads main.jsx (Vite resolves and bundles). -->
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary meta -->
    <title>Reviews Card Display – User Reviews Carousel | React, Vite, CSS, JavaScript Demo</title>
    <meta name="description" content="A simple React app that displays user reviews. Browse reviews with prev/next, view a random review, and see reviewer details. Built with React, Vite, CSS, and React Icons." />
    <meta name="author" content="Arnob Mahmud, https://www.arnobmahmud.com, contact@arnobmahmud.com" />
    <meta name="keywords" content="reviews, React, Vite, reviews carousel, user reviews, React Icons, JavaScript, CSS, frontend demo, Arnob Mahmud" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://reviews-display.vercel.app/" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://reviews-display.vercel.app/" />
    <meta property="og:title" content="Reviews Card Display – User Reviews Carousel | React & Vite Demo" />
    <meta property="og:description" content="Browse user reviews with prev/next and random. Built with React, Vite, CSS, and React Icons." />
    <meta property="og:image" content="https://reviews-display.vercel.app/vite.svg" />
    <meta property="og:site_name" content="Reviews Card Display" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:url" content="https://reviews-display.vercel.app/" />
    <meta name="twitter:title" content="Reviews Card Display – User Reviews Carousel" />
    <meta name="twitter:description" content="Browse user reviews with prev/next and random. Built with React, Vite, CSS, and React Icons." />
    <meta name="twitter:image" content="https://reviews-display.vercel.app/vite.svg" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
